<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>erick</title>
    <link rel="icon" href="erick.jpg">
    <style>
        body,
        html {
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0;
            height: 100vh;
        }

        .erick {
            font-family: monospace, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            font-size: 25px;
            text-decoration: none;
            color: black;
            transform: scale(1);
            transition: all .5s;
        }


        .viana {
            display: inline-block;
            font-family:Arial, Helvetica, sans-serif;
            font-size: 18px;
            color: black;
            transform: scale(1);
            transition: all .5s;
            filter: none;
            z-index: ;
        }

        .viana:hover {
            transform: scale(1.2);
            cursor: pointer;
        }

        .erick::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            background-color: #130303;
            bottom: 0;
            left: 0;
            transform: scale(0);
            transform-origin: center;
            transition: transform 0.3s ease;
        }

        .erick:hover::after {
            transform: scale(1.1);
        }

        .erick:hover {
            background-color: rgba(10, 100, 122, .25);
            transform: scale(1.2);
            cursor: pointer;
        }

        .erick::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 100, 122, .25);

            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;

            z-index: -1;
        }

        .erick:hover::before {
            transform: scaleX(1);
        }

        /* Só borra o "made by", o link fica de fora da confusão */
        p .txt-blur{
            transition: all .5s;
            filter: blur(0px);
        }
        p:hover .txt-blur {
            filter: blur(2px);
        }
        .space {
            position: absolute;
            margin-top: 800px;
        }
    </style>
</head>

<body>
    <a class="erick" onclick="window.open('https://www.instagram.com/erickwasfounddead/', '_blank')">
        Instagram
    </a>

    <p class="space">
        <span class="txt-blur">made by</span> <a class="viana"
            onclick="window.open('https://www.instagram.com/necrxlic/', '_blank')">NECRXLIC</a>
    </p>
</body>

</html>
